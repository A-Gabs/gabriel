    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #37352F;
        }
        .notion-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: #FFFFFF;
            border: 1px solid #E9E9E7;
            border-radius: 8px;
            transition: background-color 0.2s;
            width: 100%;
        }
        .notion-card:hover {
            background-color: #F1F1EF;
        }
        .notion-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: #F7F7F5;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .hidden {
            display: none;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-right {
            animation: slideInRight 0.3s ease-out forwards;
        }
        .animate-slide-left {
            animation: slideInLeft 0.3s ease-out forwards;
        }
    </style>

    <script>
        const services = [
            { name: "1 pregunta privada", category: "✦ General", priceSoles: 12, priceUSD: 6, emoji: "✦" },
            { name: "Sesión 20 minutos ⭐", category: "✦ General", priceSoles: 30, priceUSD: 18, emoji: "⭐" },
            { name: "Sesión 45 minutos", category: "✦ General", priceSoles: 50, priceUSD: 30, emoji: "✦" },
            { 
                name: "Tirada del ex", 
                category: "💘 Amor", 
                priceSoles: 20, 
                priceUSD: 10, 
                emoji: "💘",
                description: "Ideal para comprender conexiones que aún no cierran: Qué siente, Qué piensa, Si tiene intención de volver."
            },
            { 
                name: "Tirada de pretendientes", 
                category: "💘 Amor", 
                priceSoles: 20, 
                priceUSD: 10, 
                emoji: "💘",
                description: "Explora las intenciones y sentimientos de hasta 2 personas: Qué sienten por ti, Qué intenciones tiene cada uno, Cuál te conviene más."
            },
            { 
                name: "Tirada del \"casi algo\"", 
                category: "💘 Amor", 
                priceSoles: 20, 
                priceUSD: 10, 
                emoji: "💘",
                description: "Para aclarar vínculos inciertos o en pausa: Qué siente, Qué piensa, Si desea formalizar, Si hay terceros..."
            },
            { 
                name: "Tirada de pareja", 
                category: "💘 Amor", 
                priceSoles: 20, 
                priceUSD: 10, 
                emoji: "💘",
                description: "Conoce la energía de tu relación actual: Qué siente tu pareja, Qué piensa sobre la relación y cómo te ve."
            },
            { 
                name: "Tirada general", 
                category: "🔮 Estratégicas", 
                priceSoles: 20, 
                priceUSD: 6, 
                emoji: "🔮",
                description: "Conoce el estado actual de tu energía e influencias: Energía personal, Bloqueos o cargas presentes, Qué estás atrayendo en este momento."
            },
            { 
                name: "Tirada del mes", 
                category: "🔮 Estratégicas", 
                priceSoles: 20, 
                priceUSD: 6, 
                emoji: "🔮",
                description: "Ideal para recibir una guía para el mes en curso: Energía predominante del mes, Aspectos destacados, Desafíos y oportunidades."
            },
            { 
                name: "Tirada de evolución personal", 
                category: "🔮 Estratégicas", 
                priceSoles: 20, 
                priceUSD: 6, 
                emoji: "🔮",
                description: "Explora los cambios que estás atravesando: Energía de tu proceso actual, Qué estás dejando atrás, Qué estás llamado/a a integrar."
            },
            { 
                name: "Tirada de futuro cercano", 
                category: "🔮 Estratégicas", 
                priceSoles: 20, 
                priceUSD: 6, 
                emoji: "🔮",
                description: "Dónde se dirige tu energía próximamente: Situación actual, Influencias o caminos posibles, Resultado o panorama probable."
            }
        ];

        const categories = ["✦ General", "💘 Amor", "🔮 Estratégicas"];
        let currentCurrency = 'PEN';
        let expandedCategory = null;

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('pricing-view').classList.add('hidden');
        }

        function showPricing(currency) {
            currentCurrency = currency;
            expandedCategory = null;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('pricing-view').classList.remove('hidden');
            
            renderPricing();
        }

        function toggleCategory(cat) {
            expandedCategory = expandedCategory === cat ? null : cat;
            renderPricing();
        }

        function renderPricing() {
            const title = document.getElementById('pricing-title');
            title.innerText = currentCurrency === 'PEN' ? 'Precios Perú' : 'Precios Internacional';

            const message = document.getElementById('payment-message');
            message.innerText = currentCurrency === 'PEN' 
                ? "Aceptamos Yape y Agora al número:"
                : "Pagos seguros vía PayPal. Una vez realizado el pago, envía el comprobante por WhatsApp.";

            const yapeContainer = document.getElementById('yape-container');
            if (currentCurrency === 'PEN') {
                yapeContainer.classList.remove('hidden');
                yapeContainer.classList.add('flex');
            } else {
                yapeContainer.classList.add('hidden');
                yapeContainer.classList.remove('flex');
            }

            const list = document.getElementById('services-list');
            list.innerHTML = '';

            categories.forEach(cat => {
                const filtered = services.filter(s => s.category === cat);
                const hasVisible = currentCurrency === 'PEN' 
                    ? filtered.length > 0 
                    : filtered.some(s => s.priceUSD !== null);

                if (!hasVisible) return;

                const isGeneral = cat === "✦ General";
                const isExpanded = expandedCategory === cat || isGeneral;

                const catDiv = document.createElement('div');
                catDiv.className = 'flex flex-col gap-2';
                
                if (isGeneral) {
                    let catHeader = `
                        <div class="px-1 flex items-center gap-2">
                            <h2 class="text-[11px] font-bold uppercase tracking-wider text-[#787774] opacity-70">
                                ${cat.split(' ')[1] || cat}
                            </h2>
                            <div class="h-[1px] flex-1 bg-[#E9E9E7]"></div>
                        </div>
                        <div class="px-1 mb-1">
                            <p class="text-[12px] text-[#787774] leading-relaxed italic">
                                Las preguntas son privadas y personalizadas según tu situación.
                                La lectura se envía mediante nota de audio, donde se explica detalladamente la tirada y los mensajes que aparecen.
                                <br /><br />
                                Las sesiones se agendan previamente, coordinando un horario disponible para ambas partes.
                            </p>
                        </div>
                    `;

                    let servicesHtml = '<div class="flex flex-col gap-1.5">';
                    filtered.forEach(service => {
                        const price = currentCurrency === 'PEN' 
                            ? `S/ ${service.priceSoles}` 
                            : (service.priceUSD ? `$${service.priceUSD}` : null);

                        if (currentCurrency === 'USD' && !price) return;

                        const whatsappMsg = encodeURIComponent(`Hola Gabriel, me interesa la lectura: ${service.name}`);
                        const whatsappUrl = `https://wa.me/51960260123?text=${whatsappMsg}`;

                        servicesHtml += `
                            <a href="${whatsappUrl}" target="_blank" class="notion-card flex-col items-start gap-1 transition-colors">
                                <div class="flex items-center gap-3 w-full">
                                    <div class="notion-icon text-lg">${service.emoji}</div>
                                    <div class="flex-1">
                                        <h3 class="text-[14px] font-medium leading-tight">${service.name}</h3>
                                    </div>
                                    <div class="text-[14px] font-semibold text-[#37352F]">${price}</div>
                                </div>
                                ${service.description ? `<p class="text-[12px] text-[#787774] ml-9 leading-snug">${service.description}</p>` : ''}
                            </a>
                        `;
                    });
                    servicesHtml += '</div>';
                    catDiv.innerHTML = catHeader + servicesHtml;
                } else {
                    const description = cat === "💘 Amor" 
                        ? "Conoce lo que piensa, lo que siente y hacia dónde se dirige la conexión."
                        : "Analiza tu situación actual y proyecta tu siguiente movimiento con claridad.";
                    
                    let catHeader = `
                        <button onclick="toggleCategory('${cat}')" class="notion-card text-left flex-col items-start gap-1">
                            <div class="flex items-center gap-3 w-full">
                                <div class="notion-icon text-lg">${cat.split(' ')[0]}</div>
                                <div class="flex-1">
                                    <h3 class="text-[14px] font-bold">${cat}</h3>
                                </div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#D3D3D2] transition-transform ${isExpanded ? 'rotate-90' : ''}"><path d="m9 18 6-6-6-6"/></svg>
                            </div>
                            <p class="text-[12px] text-[#787774] ml-9 leading-snug">${description}</p>
                        </button>
                    `;

                    if (isExpanded) {
                        let servicesHtml = '<div class="flex flex-col gap-1.5 pl-4 border-l-2 border-[#E9E9E7] ml-4 mt-1">';
                        filtered.forEach(service => {
                            const price = currentCurrency === 'PEN' 
                                ? `S/ ${service.priceSoles}` 
                                : (service.priceUSD ? `$${service.priceUSD}` : null);

                            if (currentCurrency === 'USD' && !price) return;

                            const whatsappMsg = encodeURIComponent(`Hola Gabriel, me interesa la lectura: ${service.name}`);
                            const whatsappUrl = `https://wa.me/51960260123?text=${whatsappMsg}`;

                            servicesHtml += `
                                <a href="${whatsappUrl}" target="_blank" class="notion-card flex-col items-start gap-1 transition-colors">
                                    <div class="flex items-center gap-3 w-full">
                                        <div class="notion-icon text-lg">${service.emoji}</div>
                                        <div class="flex-1">
                                            <h3 class="text-[14px] font-medium leading-tight">${service.name}</h3>

                        servicesHtml += '</div>';
